{% extends 'blog/asosiy.html' %}

{% block sarlavha %}Ommabop Postlar{% endblock %}

{% block kontent %}
    <h2>🔥 Eng Ko'p O'qilgan Postlar</h2>

    {% for post in postlar %}
        <div class="post-card">
            <h3>{{ post.sarlavha }}</h3>
            <p class="post-meta">
                👁 {{ post.korildi }} marta ko'rilgan
            </p>
            <p>{{ post.matn|truncatewords:20 }}</p>
            <a href="{% url 'post_batafsil' post.id %}" class="btn">
                O'qish →
            </a>
        </div>
    {% endfor %}
{% endblock %}
